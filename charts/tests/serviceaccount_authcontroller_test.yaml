suite: ServiceAccount, ClusterRole and Role Tests - Auth-Controller
templates:
  - ../templates/auth-controller/serviceaccount.yaml
  - ../templates/auth-controller/clusterrole.yaml
  - ../templates/auth-controller/clusterrolebinding.yaml
  - ../templates/auth-controller/role.yaml
  - ../templates/auth-controller/rolebinding.yaml
  - ../templates/auth-controller/deployment.yaml
tests:

  # ── ServiceAccount ────────────────────────────────────────────────────────────

  - it: should create a ServiceAccount with the specified name
    template: ../templates/auth-controller/serviceaccount.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: true
      authcontroller.serviceAccount.name: my-authcontroller-sa
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-authcontroller-sa

  - it: should set serviceAccountName in the deployment to the specified name
    template: ../templates/auth-controller/deployment.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: true
      authcontroller.serviceAccount.name: my-authcontroller-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-authcontroller-sa

  - it: should not create a ServiceAccount when create is false even with a name
    template: ../templates/auth-controller/serviceaccount.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: false
      authcontroller.serviceAccount.name: existing-sa
    asserts:
      - hasDocuments:
          count: 0

  - it: should reference the existing ServiceAccount in the deployment
    template: ../templates/auth-controller/deployment.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: false
      authcontroller.serviceAccount.name: existing-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: existing-sa

  - it: should not create a ServiceAccount when create is false and no name is given
    template: ../templates/auth-controller/serviceaccount.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: false
      authcontroller.serviceAccount.name: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: should use the default SA name in the deployment when create is false and no name is given
    template: ../templates/auth-controller/deployment.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: false
      authcontroller.serviceAccount.name: ""
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-umauthcontroller

  - it: should create a ServiceAccount with default name when no name is specified
    template: ../templates/auth-controller/serviceaccount.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: true
      authcontroller.serviceAccount.name: ""
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-umauthcontroller

  - it: should use the default SA name in the deployment
    template: ../templates/auth-controller/deployment.yaml
    set:
      authcontroller.enabled: true
      authcontroller.serviceAccount.create: true
      authcontroller.serviceAccount.name: ""
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-umauthcontroller

  # ── ClusterRole ───────────────────────────────────────────────────────────────

  - it: should create a ClusterRole with the specified name
    template: ../templates/auth-controller/clusterrole.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: true
      authcontroller.clusterRole.name: my-authcontroller-cluster-role
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: my-authcontroller-cluster-role

  - it: should create a ClusterRole with the default computed name when no name is specified
    template: ../templates/auth-controller/clusterrole.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: true
      authcontroller.clusterRole.name: ""
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-umauthcontroller

  - it: ClusterRole should contain the basic rules
    template: ../templates/auth-controller/clusterrole.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [get, watch, list, patch]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [namespaces]
            verbs: [get, list, watch]

  - it: ClusterRole should contain the additional rules alongside the basic rules
    template: ../templates/auth-controller/clusterrole.yaml
    values:
      - values/authcontroller-additional-rules.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [get, watch, list, patch]
      - contains:
          path: rules
          content:
            apiGroups: [custom.io]
            resources: [testresources]
            verbs: [watch]

  - it: should not create a ClusterRole when create is false
    template: ../templates/auth-controller/clusterrole.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a ClusterRoleBinding when ClusterRole is disabled
    template: ../templates/auth-controller/clusterrolebinding.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: ClusterRoleBinding should reference the correct ServiceAccount and ClusterRole names
    template: ../templates/auth-controller/clusterrolebinding.yaml
    set:
      authcontroller.enabled: true
      authcontroller.clusterRole.create: true
      authcontroller.clusterRole.name: my-cluster-role
      authcontroller.serviceAccount.name: my-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: my-sa
      - equal:
          path: roleRef.name
          value: my-cluster-role

  # ── Role ──────────────────────────────────────────────────────────────────────

  - it: should create a Role with the specified name
    template: ../templates/auth-controller/role.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: true
      authcontroller.role.name: my-authcontroller-role
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Role
      - equal:
          path: metadata.name
          value: my-authcontroller-role

  - it: should create a Role with the default computed name when no name is specified
    template: ../templates/auth-controller/role.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: true
      authcontroller.role.name: ""
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-umauthcontroller

  - it: Role should contain the basic rules
    template: ../templates/auth-controller/role.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [get, watch, list, patch]
      - contains:
          path: rules
          content:
            apiGroups: [networking.k8s.io]
            resources: [ingresses]
            verbs: [get, watch, list, patch]

  - it: Role should contain the additional rules alongside the basic rules
    template: ../templates/auth-controller/role.yaml
    values:
      - values/authcontroller-additional-rules.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps]
            verbs: [get, watch, list, patch]
      - contains:
          path: rules
          content:
            apiGroups: [custom.io]
            resources: [testresources]
            verbs: [watch]

  - it: should not create a Role when create is false
    template: ../templates/auth-controller/role.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a RoleBinding when Role is disabled
    template: ../templates/auth-controller/rolebinding.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: RoleBinding should reference the correct ServiceAccount and Role names
    template: ../templates/auth-controller/rolebinding.yaml
    set:
      authcontroller.enabled: true
      authcontroller.role.create: true
      authcontroller.role.name: my-role
      authcontroller.serviceAccount.name: my-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: my-sa
      - equal:
          path: roleRef.name
          value: my-role

