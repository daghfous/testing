{{- if and .Values.authcontroller.enabled .Values.authcontroller.role.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "um.authcontroller.roleName" . | trim }}
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
    app.kubernetes.io/component: auth-controller
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  {{- with .Values.authcontroller.role.basicRules }}
  {{ toYaml . | nindent 2 | trim }}
  {{- end }}
  {{- with .Values.authcontroller.role.additionalRules }}
  {{ toYaml . | nindent 2 | trim }}
  {{- end }}
{{- end }}
