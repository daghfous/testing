{{- if and .Values.authcontroller.enabled .Values.authcontroller.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "um.authcontroller.serviceAccountName" . | trim }}
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
    app.kubernetes.io/component: auth-controller
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.authcontroller.serviceAccount.annotations }}
  annotations:
    {{ toYaml . | nindent 4 | trim }}
  {{- end }}
automountServiceAccountToken: {{ .Values.authcontroller.serviceAccount.automount }}
{{- end }}
