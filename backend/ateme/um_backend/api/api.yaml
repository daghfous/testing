  /token_introspection:
    post:
      operationId: token_introspection
      summary: Introspect token
      x-internal: true
      description: |
        Validate an access token and return authorization context.
        Used by ingress and internal components for access control decisions.
      tags:
        - Token Introspection
      parameters:
      - name: X-Original-URI
        in: header
        schema:
          type: string
          example: /users/local/demo.user
        description: Original request uri, forwarded by ingress-nginx.
      - name: X-Original-Method
        in: header
        schema:
          type: string
          example: GET
        description: Original request method, forwarded by ingress-nginx.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: 'definitions/token_introspection.yaml'
      responses:
        '200':
          description: OK - Token authorized
          headers:
            X-User:
              description: |
                Username of the user who processes the request.
              schema:
                type: string
            X-IDP-Name:
              description: |
                IDP name of the user who processes the request.
                A username is unique by IDP.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    description: Bool field of token activation
                    type: boolean
                  sub:
                    description: User ID
                    type: string
        '400':
          description: |
            BadRequest, when:
            - `uri` or `method` cannot be extracted from the request (body or headers).
        '401':
          description: |
            Unauthorized, when:
            - the token cannot be extracted from the request.
            - the token is not found in the database.
            - the token is expired.
            - the request remote IP does not match with the token user IP in database.
        '403':
          description: |
            Forbidden, when:
            - the user is not found in the database.
            - the user is not allowed to make the request or action can't be found in database.
  /token:
    post:
      operationId: login
      summary: Authenticate user
      description: |
        Authenticate a user and return an access token on success.
      tags:
      - Token
      requestBody:
        description: Login payload
        content:
          application/json:
            schema:
              $ref: 'definitions/login.yaml'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: 'definitions/token.yaml'
          description: OK - Token generated
        '206':
          content:
            application/json:
              schema:
                $ref: 'definitions/token.yaml'
          description: Partial Content - Token generated (first login or password expired)
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error - Login failed
          content:
            text/plain:
              schema:
                type: string
        '503':
          description: The number of maximum failed logins has been reached
    delete:
      operationId: force_user_disconnection
      summary: Force user logout
      description: Force logout of a selected user by revoking active tokens.
      tags:
        - Token
      x-scopes: ["administrator", "engineer", "internal_administrator"]
      requestBody:
        content:
          application/json:
            schema:
              $ref: 'definitions/user.yaml'
      responses:
        '200':
          description: OK - User token deleted, user is disconnected
        '400':
          description: Bad Request
        '404':
          description: User not found
        '500':
          description: Internal Server Error - Token removal failed
          content:
            text/plain:
              schema:
                type: string
  /refresh_token:
    post:
      operationId: refresh_token
      summary: Refresh token
      description: |
        Refresh an access token using a valid refresh token.
      tags:
        - Token
      requestBody:
        description: Post a refresh_token
        content:
          application/json:
            schema:
              $ref: 'definitions/refresh_token.yaml'
      responses:
        '200':
          description: OK - Token Pair Returned (refresh token and a new access token)
          content:
            application/json:
              schema:
                $ref: 'definitions/token.yaml'
        '400':
          description: Bad Request
  /tokenexp:
