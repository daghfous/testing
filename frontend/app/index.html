<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no" />
    <link
      rel="icon"
      href="static-um/svg/AtemeIcon.svg" />
    <script type="text/javascript">document.write(`<base href='${document.location.pathname}' />`);</script>
  </head>
  <body>
    <div id="app"></div>
    <div class="appLogin"></div>
    <script>
      // Load environment configuration dynamically
      window.__envConfig = {};
      fetch('/env/env.json')
        .then(response => response.json())
        .then(config => {
          window.__envConfig = config;
        })
        .catch(error => {
          console.warn('Failed to load /env/env.json:', error);
        });
    </script>
    <script
      type="module"
      src="/src/main.ts"></script>
  </body>
</html>
