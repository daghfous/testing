  /users/{idp_name}/{username}:
    parameters:
      - name: "idp_name"
        in: "path"
        description: "idp name unique attribute"
        required: true
        schema:
          type: string
          example: local
      - name: "username"
        in: "path"
        description: "user unique attribute"
        required: true
        schema:
          type: string
          example: demo.user
    get:
      operationId: get_user_by_name
      summary: View user
      description: Retrieve details for one user identified by idp_name and username.
      tags:
        - Users
      x-scopes: ["administrator", "internal_administrator"]
      responses:
        '200':
          description: OK - User configuration retrieved
          content:
            application/json:
              schema:
                $ref: 'definitions/user.yaml'
        '404':
          description: User object not found
          content:
            text/plain:
              schema:
                type: string
    patch:
      operationId: update_user_by_name
      summary: Update user
      description: |
        Update properties for a specific user.
        Updatable fields include `scopes`, `password`, `enabled`,
        `first_login`, `session_timeout_disabled`, and
        `password_expiration_disabled`.
      tags:
        - Users
      x-scopes: ["administrator", "internal_administrator"]
      requestBody:
        description: The parameters to update User
        content:
          application/json:
            schema:
              type: object
              title: User structure.
              properties:
                username:
                  type: string
                  deprecated: true
                scopes:
                  type: array
                  items:
                    type: string
                password:
                  type: string
                session_timeout_disabled:
                  title: Disable Session Timeout
                  description: Flag deciding whether or not to disable the session timeout
                  type: boolean
                first_login:
                  title: First login
                  description: Whether the user will be requested to change its password at next login
                  type: boolean
                enabled:
                  title: Enabled
                  description: Whether the user is enabled. A disabled user will not be able to log in.
                  type: boolean
                level:
                  type: integer
                password_expiration_disabled:
                  title: Disable Password Expiration Flag
                  description: Flag to disable password expiration for the user. This flag is applicable only to LOCAL users
                  type: boolean
            examples:
              disable_user:
                summary: Disable one user account
                value:
                  enabled: false
      responses:
        '200':
          description: OK - User updated
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Password doesn't match the constraints
        '404':
          description: User not found
        '500':
          description: User update failed
          content:
            text/plain:
              schema:
                type: string
    delete:
      operationId: remove_user_by_name
      summary: Delete user
      description: Delete a user identified by idp_name and username.
      tags:
        - Users
      x-scopes: ["administrator", "internal_administrator"]
      responses:
        '200':
          description: OK - User removed
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request
        '404':
          description: User not found
        '500':
          description: User remove failed
          content:
            text/plain:
              schema:
                type: string

