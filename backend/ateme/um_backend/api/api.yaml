                  oneOf:
                    - $ref: 'definitions/idp_ldap_config.yaml'
                    - $ref: 'definitions/idp_local_config.yaml'
                    - $ref: 'definitions/idp_saml_config.yaml'
                  discriminator:
                    propertyName: idp_type
                    mapping:
                      saml: 'definitions/idp_saml_config.yaml'
                      ldap: 'definitions/idp_ldap_config.yaml'
                      local: 'definitions/idp_local_config.yaml'

  /sync/data:
    get:
      operationId: get_sync_data
      summary: Export sync data
      description: |
        Export sync data from the database for failover or replication workflows.
        The archive format matches backup/restore for the latest supported version.
      tags:
        - Data Synchronisation
      x-internal: true
      x-scopes: ["administrator"]
      responses:
        '200':
          description: OK - Sync data ready for export
          headers:
            Content-Disposition:
              description: |
                The HTTP Content-Disposition header indicates whether content should be displayed inline
                in the browser as a web page or part of a web page or downloaded as an attachment locally.
              schema:
                type: string
                example: |
                  attachment; filename="user_management_2025-12-10_18-11-03_13.6.2_.dev2+ge345bcb5.d20251124_unknown_release_pmf.zip"

        '500':
          description: Internal Server Error - Sync data export failed
    put:
      operationId: import_sync_data
      summary: Import sync data
      description: |
        Import sync data from a backup-compatible ZIP archive.
        The request body must be a multipart/form-data binary file upload.
      tags:
        - Data Synchronisation
      x-scopes: ["administrator"]
      requestBody:
        description: Backup-compatible ZIP archive generated by export/sync APIs.
        required: true
        content:
          multipart/form-data:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: OK - Sync data imported
        '400':
          description: Bad sync data
        '500':
          description: Internal Server Error - Sync data import failed

  /fullconfiguration:
    get:
      operationId: export_full_configuration
      summary: Export full configuration
      description: Export a full configuration backup from the database.
      tags:
        - Import / Export
      x-scopes: ["administrator"]
      parameters:
        - in: query
          name: file_name
          description: The destination file name to store the export result
          schema:
            title: File name used to store the exported configuration
            description: |
              The file name (with its path) with the exported configuration, without extension.
              The .zip extension will be added at the end of the process.
            type: string
            example: "export_for_4.0"
            minLength: 1
            maxLength: 200
        - in: query
          name: include_admin_credentials
          description: Include the admin credentials to the export result
          required: false
          schema:
            type: boolean
            default: false
            example: false
      responses:
        '200':
          description: OK - Full configuration exported
        '400':
            description: Invalid filename used to export the configuration
        '500':
          description: Internal Server Error - Full configuration export failed
    put:
      operationId: import_full_configuration
      summary: Import full configuration
      description: |
        Import a full configuration backup into the database.
        The request body must be a multipart/form-data binary ZIP upload.
      tags:
        - Import / Export
      x-scopes: ["administrator"]
      parameters:
        - in: query
          name: include_admin_credentials
          description: Include the admin credentials to the import result
          required: false
          schema:
            type: boolean
            default: false
            example: false
        - in: query
          name: force_override
          description: Force the override flag to True for conflicts when importing the configuration
          required: false
          schema:
            type: boolean
            default: false
            example: true
      requestBody:
        description: Full-configuration backup ZIP file.
        required: true
        content:
          multipart/form-data:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: OK - Full configuration imported
        '400':
            description: Bad Request - Invalid full configuration
        '500':
          description: Internal Server Error - Full configuration import failed

  /auth_data:
    post:
      operationId: post_auth_data
      summary: Post authentication data
      description: |
        Internal endpoint to synchronise authentication metadata
        (actions, scopes, and API descriptors).
      x-internal: true
      x-scopes: ["internal_administrator"]
      tags:
        - Internal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - content
              properties:
                type:
                  type: string
                  enum:
                    - ADDED
                    - MODIFIED
                    - DELETED
                content:
                  type: object
                  properties:
                    actions:
                      type: array
                      items:
                        $ref: "definitions/action.yaml"
                    scopes:
                      type: array
                      items:
                        $ref: "definitions/scope.yaml"
                    api_descriptor:
                      type: array
                      items:
                        $ref: "definitions/api_descriptor.yaml"
