type: object
additionalProperties: true
required:
  - username
  - password
properties:
  username:
    type: string
    title: user username
    minLength: 3
    description: The username of the admin user. This field is required and must be at least 3 characters long.
    example: admin
  password:
    type: string
    title: admin password
    description: The password of the admin user. This field is required.
    example: "<PASSWORD>"
  enabled:
    type: boolean
    default: true
    description: Flag indicating if the admin user is enabled or not.
    example: true
    readOnly: true
  scopes:
    type: array
    title: user scopes
    description: Scopes assigned to the admin user, used for authorization.
    readOnly: true
    items:
      $ref: 'scope_id.yaml'
  authenticate_mode:
    type: string
    description: Mode used for admin user authentication. This field is deprecated and should not be used.
    enum:
      - local
    default: local
    title: authenticate mode
    deprecated: true
    readOnly: true
  level:
    type: integer
    description: Admin user level, used for display in frontend and for future use in authorization.
    minimum: 0
    deprecated: true