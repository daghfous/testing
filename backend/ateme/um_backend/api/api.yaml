            text/plain:
              schema:
                type: string
          description: OK - Token expiration changed
  /saml/callback/{idp_name}:
    parameters:
      - name: idp_name
        in: path
        description: Idp name
        required: true
        schema:
          $ref: 'definitions/idp_unique_name.yaml'
      - name: mode
        in: query
        description: |
          DEPRECATED - Mode is automatically deduced from SAMLResponse content
          Mode login or logout
        required: false
        schema:
          type: string
          deprecated: true
          enum:
            - login
            - logout
    get:
      operationId: saml_callback_get
      summary: SAML login/logout callback (GET)
      description: SAML callback URL invoked by the Identity Provider after login or logout redirect.
      tags:
        - Idp
      parameters:
        - name: RelayState
          in: query
          description: Relay state where to redirect
          schema:
            type: string
            example: /overview
        - name: SAMLResponse
          in: query
          description: SAML Response
          schema:
            type: string
            example: "<BASE64_SAML_RESPONSE>"
      responses:
        '302':
          description: OK - Redirecting after SAML assertion
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: saml_callback_post
      summary: SAML login/logout callback (POST)
      description: SAML callback endpoint receiving form-encoded SAMLResponse payloads from the Identity Provider.
      tags:
        - Idp
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: true
              properties:
                name:
                  type: array
            examples:
              saml_form_post:
                summary: Typical Idp form POST payload
                value:
                  RelayState: /overview
                  SAMLResponse: "<BASE64_SAML_RESPONSE>"
      responses:
        '302':
          content:
            application/json:
              schema:
                $ref: 'definitions/token.yaml'
          description: OK - Token generated
  /idp_sso/{idp_name}:
    parameters:
      - in: path
        name: idp_name
        description: Idp name
        required: true
        schema:
          $ref: 'definitions/idp_unique_name.yaml'
      - in: query
        name: relay_state
        description: Relay state url
        schema:
          type: string
          example: /overview
    get:
      operationId: generate_sso
      summary: Initiate SSO login
      description: Generate a provider-specific SSO URL and redirect the client.
      tags:
        - Idp
      responses:
        '302':
          description: OK - Redirecting to SSO URL
          content:
            application/json:
              schema:
                type: object

