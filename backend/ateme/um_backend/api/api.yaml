# To generate the API documentation as an HTML file, use Ateme openapi binary
# python -m ateme.openapi release ateme/um_backend/api/api.yaml ateme/um_backend/api/api.html
#
# The HTML file will need a badge on the TopLeft of the page
# You can generate the badge with those python commands:
# import anybadge
# badge = anybadge.Badge("Docs API", "User_Management", default_color='blue')
# badge.write_badge("<project-base-path>/ateme/um_backend/api/User_Management.svg", overwrite=True)
openapi: 3.0.0
info:
  title: User Management API
  version: v2
  description: |
    The User Management API allows to manage users, scopes, roles, sessions,
    tokens, and identity providers (LDAP/SAML) in PILOT Manager.
 
    Features:
    - Manage local users and their access scopes
    - Connect external Identity Providers (LDAP, SAML)
    - Manage user sessions and token lifecycle
    - Backup and restore full configuration
    - API and authorization data discovery
 
    Authentication:
    This API is token-based. A valid token must be included in request headers.
    Tokens are obtained via `POST /token` and can be refreshed via `POST /refresh_token`.
 
    Scopes:
    Endpoints are protected by role-based scopes:
    - **administrator**: Full access to all users, roles, and identity management.
    - **engineer**: Configuration-related actions with additional permissions on users, roles, and identity management.
    - **guest**: Minimal access — view personal information, logout, and change password.
  
  contact:
    name: Ateme Support
    url: https://www.ateme.com/support-services/
  license:
    name: All rights reserved - Ateme 1992-2026
  x-logo:
    # The name defined here should be the same as the name defined in the $API_NAME env variable
    # in the .build-publish-yaml-doc ci job
    url: "User_Management.svg"
    altText: "User Management Badge"
  x-auth:
    prefix: usr
    label: Users
    scope_descriptions:
      administrator: Role granting full access to all users, roles, and identity management functionalities.
      engineer: Role allowing configuration-related actions with additional permissions on users, roles, and identity management functionalities.
      guest: Role with minimal access, limited to viewing personal information, logging out, and changing the password.
      internal: Internal Role for users
      internal_administrator: Internal administrator role for system-level management operations.

servers:
  - url: https://{host}/{release_name}/users
    description: User Management API endpoint
    variables:
      host:
        default: users.example.com
        description: Hostname or IP of the User Management API ingress
      release_name:
        default: user-management
        description: Helm release name used during deployment

tags:
  - name: Documentation
    description: Endpoints to retrieve openAPI specification and API documentation
    x-internal: true
  - name: Ping
    description: Health check endpoints to verify the API is running.
    x-internal: true
  - name: Readiness
    description: Readiness probe to check whether the service is fully operational.
    x-internal: true
  - name: Admin
    description: Super administrator setup and management (single admin user allowed at installation).
  - name: Token Introspection
    description: |
      Token introspection endpoint for validating access tokens and retrieving authorization context.
      Used by ingress and internal components for access control decisions.
    x-internal: true
  - name: Token
    description: |
      Authentication token operations: login, logout, refresh.
  - name: Current User
    description: Operations available to the currently authenticated user (profile, password, preferences, actions).
  - name: Users
    description: User management — create, view, update, and delete registered users.
  - name: Scopes
    description: Scope management — define and manage role-based access scopes assigned to users.
  - name: Actions
    description: View the list of available actions derived from registered API definitions.
  - name: Idp Configuration
    description: Identity Provider configuration — manage LDAP and SAML integrations.
  - name: Idp
    description: Identity Provider runtime — SSO redirects, SAML callbacks, and SP metadata generation.
  - name: Authenticate Mode
    description: Available authentication modes (IDP configurations) for the login page.
  - name: Configuration
    description: User management service configuration (password policies, session settings, token expiration management, etc.).
  - name: Sessions
    description: Session management — list active sessions and revoke them.
  - name: Import / Export
    description: Backup and restore of the complete user management configuration.
  - name: Internal
    description: Internal system endpoints used by other microservices. Not intended for direct use by end users.
    x-internal: true
  - name: Data Synchronisation
    description: Endpoints for synchronising user management data during failover or replication scenarios.
    x-internal: true

paths:
  /definition:
    $ref: '#__auto_definition?x-internal=true'
  /documentation:
    $ref: '#__auto_doc?x-internal=true'

  /ping:
    get:
      operationId: get_ping
      summary: Ping
      description: Simple liveness check. Returns 200 if the User Management service is up and reachable.
      x-internal: true
      tags:
        - Ping
      responses:
        '200':
          description: OK - Service is up
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
  /readiness:
    get:
      operationId: get_readiness
      summary: Check readiness
      description: |
        Readiness probe. Returns 200 when the service is fully operational (database connected, all dependencies healthy).
        Returns 503 if the service is not ready to handle requests, which can be used by orchestration tools to delay traffic until the service is ready.
      x-internal: true
      tags:
        - Readiness
      responses:
        '200':
          description: OK - Service is fully functional
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
        '503':
          description: Database not Available - Service is not ready
  /admin:
    get:
      operationId: get_admin
      summary: View admin
      description: Allow to get administrator user information
      tags:
        - Admin
      x-scopes: ["administrator"]
      responses:
        '200':
          description: OK - Admin user exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    description: Admin username
                    example: "admin"
        '404':
          description: Not Found - Admin user not found
    post:
      operationId: create_admin_user
      summary: Create the Super Admin
      description: |
        Create the initial super administrator account.
        Only one admin can be created during installation.
      tags:
        - Admin
      x-scopes: ["administrator"]
      requestBody:
        content:
          application/json:
            schema:
              $ref: 'definitions/admin.yaml'
      responses:
        '201':
          description: OK - Admin user created
        '400':
          description: Bad Request - Password doesn't match the constraints
        '403':
          description: Forbidden, an admin user has already been created

  /api_definition:
    post:
      operationId: post_api_definition
      summary: Register API definition
      description: |
        Register an OpenAPI-based API definition used to compute scopes and actions.
        This endpoint is internal and intended for service-to-service usage.
      tags:
        - Internal
      x-scopes: ["internal_administrator", "internal"]
      x-internal: true
      parameters:
        - in: query
          name: disable_validation
          description: If set to `true`, validation of the API definition is disabled. Useful to avoid timeouts with large OpenAPI definitions.
          required: false
          schema:
              type: boolean
              default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: definitions/api_definition.yaml
      responses:
        '201':
          description: OK - API definition registered
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Bad Request
        '500':
            description: Internal Server Error
    delete:
      operationId: delete_api_definition
      summary: Delete API definition
      description: |
        Delete a previously registered API definition with its computed scopes,
        actions, and API descriptor metadata.
        Provide either a product payload (`prefix` + optional `app_name`) or
        a controller payload (`api_url`).
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: 'definitions/delete_api_product.yaml'
                - $ref: 'definitions/delete_api_controller.yaml'
      tags:
        - Internal
      x-internal: true
      x-scopes: ["internal_administrator", "internal"]
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error

  /user/me:
    get:
      operationId: get_current_user
      summary: View current user
      description: Return the authenticated user's profile.
      tags:
        - Current User
      x-scopes: ["administrator", "engineer", "guest", "internal"]
      responses:
        '200':
          description: OK - User profile retrieved
          content:
            application/json:
              schema:
                $ref: 'definitions/user.yaml'
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /user/me/actions:
    get:
      operationId: get_current_user_actions
      summary: View current actions
      description: Return the list of actions granted to the authenticated user.
      tags:
        - Current User
      x-scopes: ["administrator", "engineer", "guest", "internal"]
      responses:
        '200':
          description: OK - User actions retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'definitions/scope_content.yaml'
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /user/me/preferences:
    patch:
      operationId: update_user_preferences
      summary: Edit user preferences
      description: |
        Update one or more preferences for the authenticated user.
        Key/value pairs are service-defined.
      tags:
        - Current User
      x-scopes: ["administrator", "engineer", "guest", "internal"]
      requestBody:
        description: The preference key/value
        content:
          application/json:
            schema:
              type: object
              title: Preference to update for the user
            examples:
              language_preference:
                summary: Update language preference
                value:
                  language: en
      responses:
        '200':
          description: OK - User preferences updated
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /user/me/password:
    patch:
      operationId: change_password
      summary: Change password
      description: Change password for the authenticated user.
      tags:
        - Current User
      x-scopes: [ "administrator", "engineer", "guest", "internal" ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  title: User old password
                new_password:
                  type: string
                  title: User new password
            examples:
              password_rotation:
                summary: Change current password
                value:
                  old_password: "<OLD_PASSWORD>"
                  new_password: "<NEW_PASSWORD>"
      responses:
        '200':
          description: OK - Password changed
          content:
            application/json:
              schema:
                title: Result
                type: object
                properties:
                  body:
                    type: string
        '400':
          description: |
            Bad Request - Content validation failed, incorrect password,
            new password does not match constraints or is identical to previous one
        '401':
          description: Unauthorized
        '404':
          description: Not Found - User not found
  /user/me/session_timeout:
    patch:
      operationId: change_session_timeout
      summary: Change session timeout
      description: Enable or disable session timeout for the authenticated user.
      tags:
        - Current User
      x-scopes: [ "administrator" ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - disabled
              properties:
                disabled:
                  type: boolean
                  title: session timeout value
            examples:
              disable_timeout:
                summary: Disable timeout for this user
                value:
                  disabled: true
      responses:
        '200':
          description: OK - Session timeout changed
          content:
            application/json:
              schema:
                title: Result
                type: object
                properties:
                  body:
                    type: string
        '400':
          description: Bad Request - Invalid configuration
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /public/configuration:
    get:
      operationId: get_public_configuration
      summary: View public configuration
      description: |
        Return non-sensitive configuration required before authentication.
        This is a public configuration and sensitive values are intentionally excluded.
      tags:
        - Configuration
      requestBody:
        content:
          application/json:
            schema:
              $ref: 'definitions/public_configuration.yaml'
      responses:
        '200':
          description: OK - Public configuration retrieved

  /configuration:
    put:
      operationId: update_configuration
      summary: Edit configuration
      description: |
        Update the user management runtime configuration.
        Use `force_change_password=true` to require all local users to reset their password on next login.
      x-scopes: ["administrator"]
      parameters:
        - name: "force_change_password"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
            example: true
          description: This query param will force all local users to change their passwords
      tags:
        - Configuration
      requestBody:
        content:
          application/json:
            schema:
              $ref: 'definitions/configuration.yaml'
      responses:
        '200':
          description: OK - Configuration updated
        '400':
          description: Bad Request - Invalid configuration
    get:
      operationId: get_configuration
      summary: View configuration
      description: Allow to view user management configuration
      x-scopes: ["administrator"]
      tags:
        - Configuration
      responses:
        '200':
          description: OK - Configuration retrieved
          content:
            application/json:
              schema:
                $ref: 'definitions/configuration.yaml'

  /idpconfigs:
    post:
      operationId: store_idp_config
      summary: Add Identity Provider configuration
      description: |
        Create a new Identity Provider configuration.
        Use `idp_type: ldap` or `idp_type: saml` to select the provider type.
      tags:
        - Idp Configuration
      x-scopes: ["administrator"]
      requestBody:
        description: The parameters to create idp configuration
        content:
          application/json:
            schema:
              oneOf:
                - $ref: 'definitions/idp_ldap_config_post.yaml'
                - $ref: 'definitions/idp_saml_config_post.yaml'
              discriminator:
                propertyName: idp_type
                mapping:
                  saml: 'definitions/idp_saml_config_post.yaml'
                  ldap: 'definitions/idp_ldap_config_post.yaml'
      responses:
        '201':
          description: OK - Created
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Invalid configuration format
        '409':
          description: Conflict — an Identity Provider configuration with this idp_name already exists
          content:
            text/plain:
              schema:
                type: string
                example: "Identity Provider configuration with idp_name 'example_idp' already exists"
        '500':
          description: Internal Server Error - Failed to create Identity Provider configuration
          content:
            text/plain:
              schema:
                type: string
    get:
      operationId: get_idp_configs
      summary: List Identity Provider configurations
      description: |
        List configured Identity Providers.
        Secret values may be hidden depending on provider type.
      tags:
        - Idp Configuration
      x-scopes: ["administrator"]
      responses:
        '200':
          description: OK - Identity Provider configurations retrieved
          content:
            application/json:
              schema:
                title: Idp Config array
                type: array
                items:
                  oneOf:
                    - $ref: 'definitions/idp_ldap_config.yaml'
                    - $ref: 'definitions/idp_local_config.yaml'
                    - $ref: 'definitions/idp_saml_config.yaml'
  /idpconfigs/validate:
    post:
      operationId: validate_idp_config
      summary: Validate Identity Provider configuration
      description: Validate an LDAP or SAML configuration without persisting it.
      tags:
        - Idp Configuration
      x-scopes: ["administrator"]
      requestBody:
        description: Idp config to validate
        content:
          application/json:
            schema:
              oneOf:
                - $ref: 'definitions/idp_saml_config_post.yaml'
                - $ref: 'definitions/idp_ldap_config_validate.yaml'
              discriminator:
                propertyName: idp_type
                mapping:
                  saml: 'definitions/idp_saml_config_post.yaml'
                  ldap: 'definitions/idp_ldap_config_validate.yaml'
      responses:
        '200':
          description: OK - Valid IDP configuration
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Invalid configuration format
        '406':
          description: Not Acceptable — invalid IDP configuration
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal Server Error - Failed to validate Identity Provider configuration
          content:
            text/plain:
              schema:
                type: string

  /idpconfigs/{idp_name}:
    parameters:
      - name: "idp_name"
        in: "path"
        description: "idp config resource unique id"
        required: true
        schema:
          $ref: 'definitions/idp_unique_name.yaml'
    get:
      operationId: get_idp_config_by_name
      summary: View Identity Provider configuration
      description: Retrieve an Identity Provider configuration by idp_name.
      tags:
        - Idp Configuration
      x-scopes: ["administrator"]
      responses:
        '200':
          description: OK - Identity Provider configuration retrieved
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: 'definitions/idp_ldap_config.yaml'
                  - $ref: 'definitions/idp_saml_config.yaml'
        '404':
          description: Not Found - Identity Provider configuration not found
          content:
            text/plain:
              schema:
                type: string
    patch:
      operationId: update_idp_config
      summary: Update Identity Provider configuration
      description: |
        Update an existing Identity Provider configuration.
        Use update_users_scopes=true to recompute users attached scopes.
      parameters:
        - name: "update_users_scopes"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
            example: true
          description: This query param will update users scopes attached to this idp config
      tags:
        - Idp Configuration
      x-scopes: ["administrator"]
      requestBody:
        description: The parameters to update idp configuration
        content:
          application/json:
            schema:
              oneOf:
                - $ref: 'definitions/idp_ldap_config.yaml'
                - $ref: 'definitions/idp_saml_config.yaml'
              discriminator:
                propertyName: idp_type
                mapping:
                  saml: 'definitions/idp_saml_config.yaml'
                  ldap: 'definitions/idp_ldap_config.yaml'
      responses:
        '200':
          description: OK - Identity Provider configuration updated
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Invalid configuration format
        '500':
          description: Internal Server Error - Identity Provider configuration update failed
          content:
            text/plain:
              schema:
                type: string
    delete:
      operationId: remove_idp_config
      summary: Delete Identity Provider configuration
      description: |
        Delete an Identity Provider configuration by idp_name.
        Existing users are not deleted, but authentication through this IDP
        will no longer be possible after removal.
      tags:
        - Idp Configuration
      x-scopes: ["administrator"]
      responses:
        '200':
          description: OK - Identity Provider configuration removed
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Not Found - Identity Provider configuration not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal Server Error - Identity Provider configuration removal failed
          content:
            text/plain:
              schema:
                type: string
  /idp_metadata/{idp_name}:
    parameters:
      - in: path
        name: idp_name
        description: Idp name
        required: true
        schema:
          $ref: 'definitions/idp_unique_name.yaml'
    get:
      operationId: get_sp_metadata
      summary: Get Service Provider metadata
      description: |
        Generate Service Provider metadata associated with the target idp_name.
        Optionally propagates relay_state for post-authentication redirection.
      tags:
        - Idp
      parameters:
        - in: query
          name: relay_state
          description: Relay state url
          required: false
          schema:
            type: string
            example: /dashboard
      responses:
        '200':
          description: OK - Identity Provider metadata returned
          content:
            text/xml:
              schema:
                type: string
        '400':
          description: Invalid IDP metadata
  /logout:
    delete:
      operationId: logout
      summary: Log out
      description: Invalidate the current token and close the authenticated session.
      tags:
        - Token
      x-scopes: ["administrator", "engineer", "guest", "internal"]
      parameters:
        - in: query
          name: relay_state
          description: Relay state url
          schema:
            type: string
            example: /login
      responses:
        '200':
          description: OK - Token deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  body:
                    type: string
                    title: Result of logout
        '400':
          description: No token or invalid token in request headers
        '500':
          description: Internal Server Error - Token deletion failed
  /password:
    patch:
      deprecated: true
      operationId: deprecated_change_password
      summary: Change password
      description: |
        Deprecated endpoint for changing password.
        Use PATCH /user/me/password instead.
      tags:
        - Current User
      x-scopes: ["administrator", "engineer", "guest", "internal"]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                username:
                  type: string
                  title: User name
                  description: |
                    UNUSED - This field was used to identify the user to be modified.
                    Now retrieved from the token.
                idp_name:
                  type: string
                  title: Identity Provider name
                  description: |
                    UNUSED - This field was used to identify the user to be modified.
                    Now retrieved from the token.
                old_password:
                  type: string
                  title: User old password
                new_password:
                  type: string
                  title: User new password
            examples:
              deprecated_payload:
                summary: Legacy payload format
                value:
                  username: demo.user
                  idp_name: local
                  old_password: "<OLD_PASSWORD>"
                  new_password: "<NEW_PASSWORD>"
      responses:
        '410':
          description: Deprecated — use PATCH /user/me/password instead

  /v2/scopes:
    get:
      operationId: get_scopes
      summary: View scopes
      description: |
        Retrieve a list of scopes.

        Example filter usage:
        `GET /v2/scopes?mode=rw&type=engineer&label=monitor&default=false&sort=id&range=0-49`
      tags:
        - Scopes
      parameters:
        - name: sort
          in: query
          description: Sort by id, prefix with `-` for descending
          schema:
            type: string
            enum:
              - -id
              - id
            default: id
            example: id
        - in: query
          name: mode
          description: Filter by scope mode
          schema:
            $ref: 'definitions/scope_mode.yaml'
            example: rw
        - name: app_name
          in: query
          description: Filter by application release name
          required: false
          schema:
            type: string
            example: pilot-manager
        - name: type
          in: query
          description: Filter by type of scope
          required: false
          schema:
            type: string
            enum:
              - administrator
              - engineer
              - operator
              - monitoring
              - guest
            example: engineer
        - name: label
          in: query
          description: Filter by scope label containing the given text
          required: false
          schema:
            type: string
            example: sm_non_default_
        - name: default
          in: query
          description: Filter by default flag
          required: false
          schema:
            type: boolean
            example: false
        - name: range
          in: query
          description: |
            Specifies the range (zero-indexed & inclusive) of items to return from the full list of scopes
            The range of results shall be in the format `start-end` (e.g., `0-49`)
          required: false
          schema:
            type: string
            pattern: "^\\d+-\\d+$"
            example: "0-49"
      x-scopes: ["administrator", "engineer", "internal_administrator"]
      responses:
        '200':
          description: OK - List retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'definitions/scope.yaml'
        '206':
          description: Partial content response when only a subset of the full data is returned.
          headers:
            Content-Range:
              description: Specifies the range of items returned and the total count
              schema:
                type: string
                example: scopes 0-49/500
            Accept-Ranges:
              description: Indicates support for range-based pagination
              schema:
                type: string
                example: scopes 100
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'definitions/scope.yaml'
        '400':
          description: |
            BadRequest, when:
            - `mode` query param is inaccurate.
        '416':
          description: Requested range not satisfiable. None of the requested items can be returned.
          headers:
            Content-Range:
              description: Specifies the total count of items
              schema:
                type: string
                example: scopes */500
            Accept-Ranges:
              description: Indicates support for range-based pagination
              schema:
                type: string
                example: scopes 100
    post:
      operationId: store_scope
      summary: Add scope
      description: |
        Create a new scope definition.
        Required fields: `id`, `label`, `description`, and `content` (array of action/policy entries).
      tags:
        - Scopes
      x-scopes: ["administrator", "internal_administrator"]
      requestBody:
        content:
          application/json:
            schema:
              allOf:
