type: object
additionalProperties: true
required:
  - username
  - idp_name
  - user_id
  - token_id
properties:
  username:
    type: string
    title: user username
    minLength: 3
    example: demo.user
  idp_name:
    $ref: 'idp_unique_name.yaml'
    default: local
    example: local
  user_ip:
    type: string
    title: user ip
    example: 10.12.0.15
  started_date:
    type: string
    title: session started date
    example: 2024-06-01T12:00:00Z
  expiration_date:
    type: string
    title: session expiration date
    example: 2024-06-01T14:00:00Z
  user_id:
    type: string
    title: user id used in frontend for user edition
    example: 67680f7a1f4d8840b8e42831
  token_id:
    type: string
    title: token mongo id used in frontend for session deletion
    example: 676810251f4d8840b8e42832