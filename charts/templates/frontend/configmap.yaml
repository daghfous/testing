{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "um.frontend.fullname" . }}
  labels:
    app: {{ template "um.frontend.fullname" . }}
    release: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  default.conf: |
    server {
      listen {{ .Values.frontend.containerPorts.http }};
      listen [::]:{{ .Values.frontend.containerPorts.http }};
      error_log /var/log/nginx/error.log;
      access_log /var/log/nginx/access.log;

      index index.html;
      root /ateme/nginx/html;
      rewrite_log on;

      proxy_connect_timeout 20s;
      proxy_read_timeout 20s;
      proxy_send_timeout 20s;

      client_max_body_size 10M;

      # Endpoint for liveness probe
      location /healthz {
          access_log off;
          default_type text/plain;
          return 200 'alive';
      }
      # Endpoint for readiness probe
      location /ready {
          access_log off;
          default_type text/plain;
          return 200 'ready';
      }
      
      # Serve env.json for frontend dynamic configuration
      location = /env/env.json {
        alias /var/www/html/env/env.json;
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
      }
    
    }
  env.json: |
{{- if .Values.frontend.envConfig }}
{{ toYaml .Values.frontend.envConfig | indent 4 }}
{{- else }}
    {
      "BASE_URL": "/{{ .Release.Name }}/",
      "USER_MANAGEMENT_URL": "/{{ .Release.Name }}/users/",
      "RELEASE_NAME": "{{ .Release.Name }}",
      "DEPLOYING_WITH_PMF": {{ .Values.global.system.application.deployingWithPfs }},
      "APP_VERSION": "{{ .Chart.Version }}",
      "APP_ID": "{{ .Chart.Name }}"
    }
{{- end }}
{{- end }}
