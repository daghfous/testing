type: object
description: Password policy. This policy is applicable for LOCAL users only.
additionalProperties: true
properties:
  regex_pattern:
    $ref: 'password.yaml'
    readOnly: true
  expiration_delay_in_days:
    type: integer
    description: Number of days before a password must be changed (-1 to disable enforcement)
    default: -1
    oneOf:
      - type: integer
        enum: [ -1 ]
      - type: integer
        minimum: 1
  password_min_length:
    type: integer
    description: password minimum length
    default: 10
    minimum: 10
example:
  expiration_delay_in_days: 90
  password_min_length: 12