server {
  listen 81;
  listen [::]:81;
  error_log /var/log/nginx/error.log;
  access_log /var/log/nginx/access.log;

  server_name PILOT application;
  index index.html;
  root /ateme/nginx/html;
  rewrite_log on;

  proxy_connect_timeout 10s;
  proxy_read_timeout 10s;
  proxy_send_timeout 10s;

  # Serve env.json for frontend dynamic configuration
  # File is mounted from Kubernetes configmap at /var/www/html/env/env.json
  location = /env/env.json {
    alias /var/www/html/env/env.json;
    add_header Content-Type application/json;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires 0;
  }

  location / {
    try_files $uri$args $uri$args/ $uri $uri/ /index.html =404;
  }

}
